<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>waiting...</title>
    
    <link rel="icon" type="image/png" href="fly.png">
    <link rel="apple-touch-icon" href="fly.png">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: white;
            font-family: 'Pretendard', sans-serif;
            touch-action: none;
        }

        #container { width: 100%; height: 100%; position: relative; }

        #character {
            position: fixed; top: 0; left: 0;
            width: 40px; 
            pointer-events: none; z-index: 10;
            display: none;
            transform-origin: top center; 
            will-change: transform;
        }
        #fly-img { width: 100%; height: auto; display: block; }

        /* --- 대기 화면 레이아웃 보정 --- */
        #waiting-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background-color: black; z-index: 20;
        }

        #waiting-content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; 
            width: max-content; /* 내부 글자 길이에 맞춰 박스 확장 */
            max-width: 95vw;    /* 화면 너비 95%까지 허용 */
        }

        #status-msg {
            color: white; font-size: 5vw; font-weight: 800;
            display: block; margin-bottom: 20px; letter-spacing: -0.02em;
            white-space: nowrap; /* 모바일 줄바꿈 절대 방지 */
        }

        .eyes-wrapper { 
            display: flex; justify-content: center; gap: 2vw; 
            width: 70vw; margin: 0 auto;
        }

        .eye-container {
            flex: 1; aspect-ratio: 1.8 / 1; position: relative;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; background-color: transparent;
        }

        .eye-shape {
            background-color: white; width: 70%; height: 85%;
            position: absolute;
            border-radius: 40% 60% 40% 60% / 30% 70% 30% 70%;
        }
        .eye-container:last-child .eye-shape { transform: scaleX(-1); }
        
        .pupil { 
            background-color: black; width: 35%; aspect-ratio: 1 / 1; 
            border-radius: 50%; position: relative; z-index: 5; 
            animation: lookAround 3s ease-in-out infinite;
        }

        @keyframes lookAround {
            0%, 100% { transform: translateX(-20%); }
            50% { transform: translateX(20%); }
        }

        .waiting-eyelid {
            position: absolute; top: -110%; left: 0; width: 100%; height: 110%;
            background-color: black; z-index: 10;
            animation: waitingBlink 1.5s infinite;
        }

        @keyframes waitingBlink {
            0%, 80% { top: -110%; }
            90% { top: 0%; }
            100% { top: -110%; }
        }

        #svgPathContainer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; background-color: white; z-index: 30;
        }
        #pathSvg { width: 100%; height: 100%; }

        #ui-overlay { 
            display: none; position: fixed; bottom: 8%; left: 50%; 
            transform: translateX(-50%); text-align: center; z-index: 40; 
            width: max-content; /* 하단 UI도 길이에 맞춰 확장 */
        }

        .credits { 
            margin-bottom: 25px; color: black; font-size: 14px; 
            line-height: 1.6; font-weight: 400;
        }
        .credits a { color: black; text-decoration: underline; }

        /* --- 다운로드 버튼 줄바꿈 방지 --- */
        #download-btn { 
            padding: 12px 28px; background: black; color: white; 
            border: none; cursor: pointer; font-weight: 500; border-radius: 4px;
            letter-spacing: 0.5px;
            white-space: nowrap; /* 버튼 글자 줄바꿈 방지 */
        }
    </style>
</head>
<body>

<div id="container">
    <div id="character">
        <img id="fly-img" src="fly.png" alt="fly">
    </div>

    <div id="waiting-overlay">
        <div id="waiting-content">
            <span id="status-msg">Waiting for you to comeback<br>
            for <span id="out-timer">0</span> seconds...</span>
            <div class="eyes-wrapper">
                <div class="eye-container">
                    <div class="eye-shape"></div>
                    <div class="pupil"></div>
                    <div class="waiting-eyelid"></div>
                </div>
                <div class="eye-container">
                    <div class="eye-shape"></div>
                    <div class="pupil"></div>
                    <div class="waiting-eyelid"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="svgPathContainer">
        <svg id="pathSvg"><polyline id="pathPolyline" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
</div>

<div id="ui-overlay">
    <div class="credits">
        You waited for 400 seconds…<br><br>
        Concept & Production: <a href="https://www.instagram.com/wegee.eui/" target="_blank">@wegee.eui</a><br>
        ⓒ 2026. Wegee. All rights reserved.
    </div>
    <button id="download-btn">Save your waiting path...</button>
</div>

<script>
    const TARGET_SECONDS = 15; // 테스트용 15초 설정
    let totalOutTimeMs = 0, outStartTime = null, stayStartTime = Date.now();
    let path = [], isFinished = false, msgTimeout = null;

    const char = document.getElementById('character');
    const flyImg = document.getElementById('fly-img');
    const waiting = document.getElementById('waiting-overlay');

    let angle = 0, amplitude = 25, lastMoveTime = Date.now();

    setInterval(() => {
        if (isFinished) return;
        flyImg.src = 'fly_closed.png';
        setTimeout(() => { flyImg.src = 'fly.png'; }, 200);
    }, 4000);

    function animateSwing() {
        if (isFinished) return;
        const now = Date.now();
        const idleTime = (now - lastMoveTime) / 1000;
        const currentAmplitude = Math.max(0, amplitude * Math.exp(-0.15 * idleTime));
        angle += 0.15;
        const rotation = Math.sin(angle) * currentAmplitude;
        char.style.transform = `translate(-50%, 0) rotate(${rotation}deg)`;
        requestAnimationFrame(animateSwing);
    }
    animateSwing();

    function updatePos(x, y) {
        if (isFinished || outStartTime) return;
        path.push({ x, y });
        char.style.display = 'block';
        char.style.left = x + 'px';
        char.style.top = (y + 5) + 'px'; 
        lastMoveTime = Date.now();
    }

    window.addEventListener('mousemove', e => updatePos(e.clientX, e.clientY));
    window.addEventListener('touchmove', e => {
        const t = e.touches[0];
        updatePos(t.clientX, t.clientY);
        e.preventDefault();
    }, { passive: false });

    // --- 대기 상태 진입/복귀 로직 통합 ---
    function userLeft() {
        if (isFinished || outStartTime) return;
        outStartTime = Date.now();
        msgTimeout = setTimeout(() => {
            char.style.display = 'none';
            waiting.style.display = 'block';
        }, 100); // 모바일 대응을 위해 딜레이 단축
    }

    function userReturned() {
        if (isFinished) return;
        if (outStartTime) {
            totalOutTimeMs += Date.now() - outStartTime;
            outStartTime = null;
        }
        clearTimeout(msgTimeout);
        setTimeout(() => { if (!outStartTime) waiting.style.display = 'none'; }, 300);
    }

    // 모든 이탈 케이스 감지
    window.addEventListener('blur', userLeft);
    window.addEventListener('focus', userReturned);
    document.addEventListener('mouseleave', userLeft);
    document.addEventListener('mouseenter', userReturned);
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) userLeft();
        else userReturned();
    });

    setInterval(() => {
        if (isFinished) return;
        let currentOut = totalOutTimeMs + (outStartTime ? Date.now() - outStartTime : 0);
        document.getElementById('out-timer').textContent = Math.floor(currentOut/1000);
        if (Date.now() - stayStartTime - totalOutTimeMs >= TARGET_SECONDS * 1000) finish();
    }, 100);

    function finish() {
        isFinished = true;
        char.style.display = 'none';
        waiting.style.display = 'none';
        document.getElementById('svgPathContainer').style.display = 'block';
        document.getElementById('ui-overlay').style.display = 'block';
        const poly = document.getElementById('pathPolyline');
        if (path.length > 0) {
            const xs = path.map(p => p.x), ys = path.map(p => p.y);
            const minX = Math.min(...xs)-50, minY = Math.min(...ys)-50;
            const w = Math.max(...xs)-minX+50, h = Math.max(...ys)-minY+50;
            document.getElementById('pathSvg').setAttribute('viewBox', `${minX} ${minY} ${w} ${h}`);
            poly.setAttribute('points', path.map(p => `${p.x},${p.y}`).join(' '));
        }
    }
    
    document.getElementById('download-btn').addEventListener('click', () => {
        const svg = document.getElementById('pathSvg');
        const svgData = new XMLSerializer().serializeToString(svg);
        const canvas = document.createElement('canvas');
        const viewBox = svg.viewBox.baseVal;
        canvas.width = viewBox.width * 3; canvas.height = viewBox.height * 3;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
            ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const link = document.createElement('a');
            link.download = 'my-waiting-path.png';
            link.href = canvas.toDataURL(); link.click();
        };
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
    });
</script>
</body>
</html>
